name: lint-build-and-publish-plugin
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
            distribution: 'temurin' 
            java-version: '25'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
            maven-version: 3.8.2
      - uses: s4u/maven-settings-action@v4.0.0
      - name: Lint with spotless
        run: mvn com.diffplug.spotless:spotless-maven-plugin:3.6.0:apply
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-java@v5
          with:
            distribution: 'temurin' 
            java-version: '25'
        - name: Set up Maven
          uses: stCarolas/setup-maven@v5
          with:
            maven-version: 3.8.2
        - name: Package to jar
          run: mvn package
        - run: mkdir staging && cp target/*.jar staging
        - uses: actions/upload-artifact@v4
          with:
            name: jar-file
            path: staging
  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: mkdir jars
      - uses: actions/download-artifact@v5
        with:
          name: jar-file
          path: jars/
      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: jars/*
